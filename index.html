<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아카라라이프 뉴스 모니터링</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { DEFAULT: '#00a3a3', dark: '#0f172a' } },
        fontFamily: { sans: ['"Pretendard Variable"', 'Pretendard', 'system-ui', '"Malgun Gothic"', '"Apple SD Gothic Neo"', 'sans-serif'] } } }
    };
  </script>
  <style>
    :root { --tracking: -0.011em; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: "Pretendard Variable", Pretendard, system-ui, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: var(--tracking);
      line-height: 1.65;
      word-break: keep-all;          /* 한글 단어가 어색하게 잘리지 않도록 */
      overflow-wrap: anywhere;       /* 아주 긴 URL/영문은 줄바꿈 허용 */
      font-feature-settings: "tnum" 1, "cv01" 1;  /* 숫자 고정폭 → 표/수치 정렬 깔끔 */
    }
    h1, h2, h3 { letter-spacing: -0.02em; line-height: 1.3; font-weight: 700; }
    .num { font-feature-settings: "tnum" 1; letter-spacing: -0.02em; }  /* KPI 숫자 */
    table { font-feature-settings: "tnum" 1; }
    thead th { letter-spacing: 0.01em; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:16px; box-shadow:0 1px 2px rgba(15,23,42,.04); }
    ::-webkit-scrollbar { width:10px; height:10px; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:8px; }
    ::-webkit-scrollbar-thumb:hover { background:#94a3b8; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans">

  <!-- ===== 설정: 여기에 구글 Apps Script 웹앱 URL ===== -->
  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbznh3A1w90zh7-UkUhgGGELtPzmTaT9ag1bJcE36efs7CkBC0Qlv_dlRblC0bnnTO-C/exec";
  </script>

  <!-- Header -->
  <header class="bg-slate-900 text-white sticky top-0 z-20 shadow-lg">
    <div class="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-brand flex items-center justify-center text-lg font-bold">A</div>
        <div>
          <h1 class="text-lg font-bold leading-tight">아카라라이프 뉴스 모니터링</h1>
          <p class="text-xs text-slate-400 leading-tight">Aqara Life PR Coverage Dashboard</p>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span id="updated" class="text-xs text-slate-400 hidden sm:inline"></span>
        <button id="refreshBtn" onclick="loadData()" class="text-sm bg-brand hover:bg-teal-600 transition px-4 py-2 rounded-lg font-semibold">
          새로고침
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-5 py-6">

    <!-- 로딩/에러 -->
    <div id="loading" class="text-center py-20 text-slate-400">데이터를 불러오는 중…</div>
    <div id="error" class="hidden text-center py-20 text-red-500"></div>

    <div id="content" class="hidden space-y-6">

      <!-- KPI -->
      <section class="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="card p-5">
          <p class="text-sm text-slate-500">전체 기사</p>
          <p id="kpiTotal" class="num text-3xl font-extrabold text-slate-900 mt-1">–</p>
        </div>
        <div class="card p-5">
          <p class="text-sm text-slate-500">최근 30일</p>
          <p id="kpiRecent" class="num text-3xl font-extrabold text-brand mt-1">–</p>
        </div>
        <div class="card p-5">
          <p class="text-sm text-slate-500">활동 매체 수</p>
          <p id="kpiMedia" class="num text-3xl font-extrabold text-slate-900 mt-1">–</p>
        </div>
        <div class="card p-5">
          <p class="text-sm text-slate-500">검수 대기</p>
          <p id="kpiReview" class="num text-3xl font-extrabold text-amber-500 mt-1">–</p>
        </div>
      </section>

      <!-- 차트 -->
      <section class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="card p-5">
          <h2 class="font-bold mb-4 text-slate-700">매체별 노출 비율 <span class="text-xs font-normal text-slate-400">(상위 8)</span></h2>
          <div class="h-72"><canvas id="mediaChart"></canvas></div>
        </div>
        <div class="card p-5">
          <h2 class="font-bold mb-4 text-slate-700">월별 커버리지 추이</h2>
          <div class="h-72"><canvas id="monthChart"></canvas></div>
        </div>
      </section>

      <!-- 뉴스 리스트 -->
      <section class="card p-5">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
          <h2 class="font-bold text-slate-700">최신 뉴스 <span id="listCount" class="text-sm font-normal text-slate-400"></span></h2>
          <div class="flex flex-wrap gap-2">
            <input id="search" type="text" placeholder="기사명·매체 검색" oninput="renderTable()"
              class="text-sm border border-slate-300 rounded-lg px-3 py-2 w-48 focus:outline-none focus:ring-2 focus:ring-brand" />
            <select id="filterKind" onchange="renderTable()" class="text-sm border border-slate-300 rounded-lg px-3 py-2 bg-white">
              <option value="">전체 종류</option>
            </select>
            <select id="filterReview" onchange="renderTable()" class="text-sm border border-slate-300 rounded-lg px-3 py-2 bg-white">
              <option value="">전체 상태</option>
              <option value="확정">확정</option>
              <option value="검수요망">검수 대기</option>
            </select>
          </div>
        </div>
        <div class="overflow-auto max-h-[560px] rounded-lg border border-slate-100">
          <table class="w-full text-sm">
            <thead class="bg-slate-50 text-slate-500 sticky top-0 z-10">
              <tr class="text-left">
                <th class="px-4 py-3 font-semibold whitespace-nowrap">게재일</th>
                <th class="px-4 py-3 font-semibold whitespace-nowrap">매체</th>
                <th class="px-4 py-3 font-semibold whitespace-nowrap">종류</th>
                <th class="px-4 py-3 font-semibold">기사명</th>
                <th class="px-4 py-3 font-semibold whitespace-nowrap">상태</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </section>

      <p class="text-center text-xs text-slate-400 pt-2">
        데이터 출처: 구글 시트 · 자동 수집(구글뉴스) + 수동 보완 · 기사 제목 클릭 시 원문(또는 뉴스 검색)으로 이동
      </p>
    </div>
  </main>

  <script>
    // 차트 폰트도 Pretendard로 통일
    if (window.Chart) { Chart.defaults.font.family = '"Pretendard Variable", Pretendard, system-ui, sans-serif'; Chart.defaults.color = '#475569'; }
    let ALL = [];

    // ---- JSONP 로딩 (CORS 회피) ----
    let jsonpTimer = null;
    function loadData() {
      showLoading();
      window.__onAqaraData = function (payload) {
        clearTimeout(jsonpTimer);
        if (!payload || !payload.ok) { showError('데이터 응답 오류: ' + (payload && payload.error || '알 수 없음')); return; }
        ALL = (payload.rows || []);
        document.getElementById('updated').textContent = '업데이트: ' + (payload.generatedAt || new Date().toLocaleString('ko-KR'));
        render();
      };
      const s = document.createElement('script');
      s.src = API_URL + '?callback=__onAqaraData&_=' + Date.now();
      s.onerror = function () { showError('네트워크 오류로 데이터를 불러오지 못했습니다. 웹앱 URL/배포 상태를 확인하세요.'); };
      document.body.appendChild(s);
      s.onload = function () { s.remove(); };
      jsonpTimer = setTimeout(function () { showError('응답 시간 초과. 웹앱이 배포되어 있고 GET 접근이 허용되는지 확인하세요.'); }, 15000);
    }

    function showLoading() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('content').classList.add('hidden');
    }
    function showError(msg) {
      const e = document.getElementById('error');
      e.textContent = '⚠ ' + msg; e.classList.remove('hidden');
      document.getElementById('loading').classList.add('hidden');
    }

    // ---- 유틸 ----
    function baseMedia(m) { return (m || '').replace(/\(.*?\)/g, '').trim() || '(미상)'; }
    function fallbackLink(row) {
      const l = (row['링크'] || '').toString().trim();
      if (l) return l;
      return 'https://search.naver.com/search.naver?where=news&query=' + encodeURIComponent(row['기사명'] || '');
    }
    function reviewBadge(v) {
      v = (v || '').toString();
      if (v.indexOf('확정') > -1) return '<span class="px-2 py-0.5 rounded-full text-xs bg-emerald-100 text-emerald-700">확정</span>';
      if (v.indexOf('검수') > -1 || v.indexOf('자동수집') > -1) return '<span class="px-2 py-0.5 rounded-full text-xs bg-amber-100 text-amber-700">검수요망</span>';
      if (v.indexOf('테스트') > -1) return '<span class="px-2 py-0.5 rounded-full text-xs bg-slate-100 text-slate-500">테스트</span>';
      return '<span class="text-slate-400 text-xs">' + (v || '-') + '</span>';
    }
    function esc(s) { return (s || '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])); }

    // ---- 렌더 ----
    let mediaChart, monthChart;
    function render() {
      document.getElementById('loading').classList.add('hidden');
      document.getElementById('error').classList.add('hidden');
      document.getElementById('content').classList.remove('hidden');

      // KPI
      const now = new Date();
      const d30 = new Date(now.getTime() - 30 * 864e5);
      const recent = ALL.filter(r => { const d = new Date(r['게재일']); return d instanceof Date && !isNaN(d) && d >= d30; }).length;
      const mediaSet = new Set(ALL.map(r => baseMedia(r['매체'])));
      const reviewCnt = ALL.filter(r => { const v = (r['검수'] || '').toString(); return v.indexOf('검수') > -1 || v.indexOf('자동수집') > -1; }).length;
      document.getElementById('kpiTotal').textContent = ALL.length.toLocaleString();
      document.getElementById('kpiRecent').textContent = recent.toLocaleString();
      document.getElementById('kpiMedia').textContent = mediaSet.size.toLocaleString();
      document.getElementById('kpiReview').textContent = reviewCnt.toLocaleString();

      // 종류 필터 옵션
      const kinds = [...new Set(ALL.map(r => (r['종류'] || '').toString().trim()).filter(Boolean))].sort();
      const fk = document.getElementById('filterKind');
      fk.innerHTML = '<option value="">전체 종류</option>' + kinds.map(k => `<option value="${esc(k)}">${esc(k)}</option>`).join('');

      drawMediaChart();
      drawMonthChart();
      renderTable();
    }

    function drawMediaChart() {
      const counts = {};
      ALL.forEach(r => { const m = baseMedia(r['매체']); counts[m] = (counts[m] || 0) + 1; });
      let arr = Object.entries(counts).sort((a, b) => b[1] - a[1]);
      const top = arr.slice(0, 8);
      const etc = arr.slice(8).reduce((s, x) => s + x[1], 0);
      const labels = top.map(x => x[0]).concat(etc ? ['기타'] : []);
      const data = top.map(x => x[1]).concat(etc ? [etc] : []);
      const palette = ['#00a3a3', '#0ea5e9', '#6366f1', '#f59e0b', '#ef4444', '#10b981', '#8b5cf6', '#ec4899', '#94a3b8'];
      if (mediaChart) mediaChart.destroy();
      mediaChart = new Chart(document.getElementById('mediaChart'), {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: palette, borderWidth: 2, borderColor: '#fff' }] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } } }
      });
    }

    function drawMonthChart() {
      const counts = {};
      ALL.forEach(r => {
        const d = (r['게재일'] || '').toString();
        const ym = d.length >= 7 ? d.substring(0, 7) : (r['월'] ? '월 ' + r['월'] : '기타');
        counts[ym] = (counts[ym] || 0) + 1;
      });
      const labels = Object.keys(counts).sort();
      const data = labels.map(l => counts[l]);
      if (monthChart) monthChart.destroy();
      monthChart = new Chart(document.getElementById('monthChart'), {
        type: 'bar',
        data: { labels, datasets: [{ label: '기사 수', data, backgroundColor: '#00a3a3', borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { precision: 0 } } } }
      });
    }

    function renderTable() {
      const q = (document.getElementById('search').value || '').toLowerCase().trim();
      const fk = document.getElementById('filterKind').value;
      const fr = document.getElementById('filterReview').value;
      let rows = ALL.slice().sort((a, b) => (b['게재일'] || '').localeCompare(a['게재일'] || ''));
      rows = rows.filter(r => {
        if (fk && (r['종류'] || '').toString().trim() !== fk) return false;
        if (fr) {
          const v = (r['검수'] || '').toString();
          if (fr === '확정' && v.indexOf('확정') < 0) return false;
          if (fr === '검수요망' && !(v.indexOf('검수') > -1 || v.indexOf('자동수집') > -1)) return false;
        }
        if (q) {
          const hay = ((r['기사명'] || '') + ' ' + (r['매체'] || '')).toLowerCase();
          if (hay.indexOf(q) < 0) return false;
        }
        return true;
      });
      document.getElementById('listCount').textContent = '(' + rows.length + '건)';
      const body = document.getElementById('tableBody');
      if (!rows.length) { body.innerHTML = '<tr><td colspan="5" class="text-center py-10 text-slate-400">결과가 없습니다.</td></tr>'; return; }
      body.innerHTML = rows.map(r => `
        <tr class="hover:bg-slate-50 transition">
          <td class="px-4 py-3 whitespace-nowrap text-slate-500">${esc(r['게재일'])}</td>
          <td class="px-4 py-3 whitespace-nowrap font-medium text-slate-700">${esc(r['매체'])}</td>
          <td class="px-4 py-3 whitespace-nowrap text-slate-500">${esc(r['종류'])}</td>
          <td class="px-4 py-3">
            <a href="${esc(fallbackLink(r))}" target="_blank" rel="noopener noreferrer"
               class="text-slate-800 hover:text-brand hover:underline">${esc(r['기사명'])}
               <span class="text-slate-300">↗</span></a>
          </td>
          <td class="px-4 py-3 whitespace-nowrap">${reviewBadge(r['검수'])}</td>
        </tr>`).join('');
    }

    loadData();
  </script>
</body>
</html>
