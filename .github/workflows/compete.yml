name: Competitor SoV

# 매일 09:30(UTC)=한국 18:30 경쟁사 언론 노출량 수집 → compete.json
on:
  schedule:
    - cron: '30 9 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/compete.yml'
      - 'crawler/compete_fetch.py'

permissions:
  contents: write

concurrency:
  group: competitor-sov
  cancel-in-progress: false

jobs:
  compete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch competitor SoV
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
        run: python crawler/compete_fetch.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compete.json
          git diff --staged --quiet || git commit -m "compete.json 자동 갱신"
          git push
