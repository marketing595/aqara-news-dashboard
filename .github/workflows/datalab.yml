name: DataLab Trend

# 매달 1일 09:00(KST) 검색 트렌드·키워드 검색량 수집 → datalab.json / keywords_trend.json
on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/datalab.yml'
      - 'crawler/datalab_fetch.py'
      - 'crawler/keyword_trend_fetch.py'

permissions:
  contents: write

concurrency:
  group: datalab-trend
  cancel-in-progress: false

jobs:
  datalab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch DataLab trend
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
        run: python crawler/datalab_fetch.py
      - name: Fetch keyword trends (기회 키워드용)
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          SEARCHAD_API_KEY: ${{ secrets.SEARCHAD_API_KEY }}
          SEARCHAD_SECRET: ${{ secrets.SEARCHAD_SECRET }}
          SEARCHAD_CUSTOMER_ID: ${{ secrets.SEARCHAD_CUSTOMER_ID }}
        run: python crawler/keyword_trend_fetch.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datalab.json keywords_trend.json
          git diff --staged --quiet || git commit -m "datalab.json·keywords_trend.json 자동 갱신"
          git push
