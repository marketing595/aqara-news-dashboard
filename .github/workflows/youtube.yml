name: YouTube Monitor

# 매일 09:20(UTC) 유튜브 캠페인 영상 실측 → youtube.json 갱신 → 커밋
on:
  schedule:
    - cron: '20 9 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: youtube-monitor
  cancel-in-progress: false

jobs:
  youtube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch YouTube metrics
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python crawler/youtube_fetch.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add youtube.json
          git diff --staged --quiet || git commit -m "youtube.json 자동 갱신"
          git push
