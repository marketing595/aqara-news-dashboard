name: Aqara News Crawler

# [일시중지됨] 수기 데이터 정리 중 충돌 방지를 위해 매시간 자동실행을 잠시 꺼둠.
# 재개하려면 아래 schedule 블록의 주석(#)을 풀면 됩니다.
on:
  # schedule:
  #   - cron: '0 * * * *'      # 매시간 정각(UTC)
  workflow_dispatch: {}

# 동시 실행 방지
concurrency:
  group: aqara-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Run crawler
        env:
          WEBAPP_URL:   ${{ secrets.WEBAPP_URL }}
          WEBAPP_TOKEN: ${{ secrets.WEBAPP_TOKEN }}
          NAVER_ID:     ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          KEYWORDS: '아카라라이프,aqara,아카라'
          DAYS: '90'
        run: python crawler/aqara_crawler.py
