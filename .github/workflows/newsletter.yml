name: Newsletter

# 매일 22:30(UTC)=한국 07:30 스티비 뉴스레터 발송 통계 수집 → newsletter.json
on:
  schedule:
    - cron: '30 22 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - '.github/workflows/newsletter.yml'
      - 'crawler/newsletter_fetch.py'

permissions:
  contents: write

concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  newsletter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch Stibee newsletter
        env:
          STIBEE_TOKEN: ${{ secrets.STIBEE_TOKEN }}
          STIBEE_TOKEN_SIJEOL: ${{ secrets.STIBEE_TOKEN_SIJEOL }}
        run: python crawler/newsletter_fetch.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add newsletter.json newsletter_raw.json
          git diff --staged --quiet || git commit -m "newsletter.json 자동 갱신 (Stibee)"
          git push
